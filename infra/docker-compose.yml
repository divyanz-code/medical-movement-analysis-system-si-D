services:
  backend:
    build:
      context: ../services/backend
      dockerfile: Dockerfile
    container_name: mma-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/mma
      JWT_SECRET: dev-only-jwt-secret-change-in-prod-12345
      # JSON arrays required because pydantic-settings parses list fields as JSON from env.
      CORS_ORIGINS: '["http://localhost:19006","http://localhost:8081"]'
      # Local-dev convenience. Lock this down per-domain in non-dev environments.
      ALLOWED_HOSTS: '["*"]'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  db:
    image: postgres:17-alpine
    container_name: mma-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mma
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - mma_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mma"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mma_pg_data:
